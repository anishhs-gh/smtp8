name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # ── Detect which packages changed ────────────────────────────────────────────
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      cli: ${{ steps.filter.outputs.cli }}
      firebase-config: ${{ steps.filter.outputs.firebase-config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/src/**'
              - 'backend/package.json'
              - 'backend/package-lock.json'
              - 'backend/tsconfig.json'
            frontend:
              - 'frontend/src/**'
              - 'frontend/public/**'
              - 'frontend/index.html'
              - 'frontend/vite.config.ts'
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
              - 'frontend/tailwind.config.*'
              - 'frontend/tsconfig*.json'
            cli:
              - 'cli/src/**'
              - 'cli/package.json'
              - 'cli/package-lock.json'
              - 'cli/tsconfig.json'
            firebase-config:
              - 'firebase.json'
              - '.firebaserc'

  # ── Deploy Firebase Functions (backend changed) ───────────────────────────────
  deploy-functions:
    name: Deploy — Firebase Functions
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.firebase-config == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Write backend env file
        run: echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" > backend/.env.smtp8-ws

      - name: Deploy Firebase Functions
        run: npx firebase-tools deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive

  # ── Deploy Firebase Hosting (frontend changed) ────────────────────────────────
  deploy-hosting:
    name: Deploy — Firebase Hosting
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.firebase-config == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive

  # ── Publish CLI to npm (cli changed) ─────────────────────────────────────────
  deploy-cli:
    name: Deploy — npm publish (smtp8 CLI)
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Check if version already published
        id: version-check
        working-directory: cli
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view smtp8@$VERSION version 2>/dev/null | grep -q "$VERSION"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.exists == 'false'
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
