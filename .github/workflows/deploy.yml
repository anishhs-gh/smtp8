name: Deploy

on:
  push:
    branches:
      - master

jobs:
  # ── Detect which packages changed ────────────────────────────────────────────
  changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      cli: ${{ steps.filter.outputs.cli }}
      firebase-config: ${{ steps.filter.outputs.firebase-config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            cli:
              - 'cli/**'
            firebase-config:
              - 'firebase.json'
              - '.firebaserc'

  # ── Deploy Firebase Functions (backend changed) ───────────────────────────────
  deploy-functions:
    name: Deploy — Firebase Functions
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.firebase-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Write backend env file
        # Firebase Functions reads backend/.env.smtp8-ws at deploy time and
        # uploads it alongside the function. Create it from GitHub Secrets so
        # CI never needs the file committed.
        run: echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" > backend/.env.smtp8-ws

      - name: Deploy Firebase Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  # ── Deploy Firebase Hosting (frontend changed) ────────────────────────────────
  deploy-hosting:
    name: Deploy — Firebase Hosting
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.firebase-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          # Vite picks up VITE_* env vars at build time. This overrides any
          # local .env.production so CI always uses the value from Secrets.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

  # ── Publish CLI to npm (cli changed) ─────────────────────────────────────────
  deploy-cli:
    name: Deploy — npm publish (smtp8 CLI)
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
